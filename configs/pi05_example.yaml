#   freeze_backbone: false  # Fine-tune entire model
#   action_dim: 7
#
# training:
#   epochs: 50
#   batch_size: 16
#   learning_rate: 1e-5  # Lower LR for full fine-tuning
#   gradient_accumulation_steps: 4  # Effective batch size = 64
#
# data:
#   type: lerobot
#   dataset: "your_org/large_manipulation_dataset"

# Scenario 3: Training from scratch (not recommended - use pretrained!)
# ------------------------------------------------------------------------------
# model:
#   pretrained_model_name_or_path: null  # Train from scratch
#   freeze_backbone: false
#   action_dim: 7
#
# training:
#   epochs: 200
#   batch_size: 64
#   learning_rate: 1e-4
#   lr_scheduler:
#     warmup_steps: 10000
#
# Note: Training from scratch requires MUCH more data and compute

# Scenario 4: Multi-camera, multi-modal MCAP dataset
# ------------------------------------------------------------------------------
# model:
#   pretrained_model_name_or_path: "lerobot/pi05_base"
#   freeze_backbone: false
#
# data:
#   type: mcap
#   train_path: "data/real_robot_demos/*.mcap"
#   topics:
#     cameras:
#       - name: wrist
#         topic: /camera/wrist/image_raw
#       - name: overhead
#         topic: /camera/overhead/image_raw
#       - name: gripper
#         topic: /camera/gripper/image_raw
#     instruction_topic: /task/description
#
# training:
#   batch_size: 8  # Lower for multi-camera
#   mixed_precision: "bf16"  # Better for multi-modal

# Scenario 5: Memory-constrained training on Apple Silicon
# ------------------------------------------------------------------------------
# model:
#   pretrained_model_name_or_path: "lerobot/pi05_base"
#   freeze_backbone: true  # Reduce memory
#
# training:
#   batch_size: 4  # Small batch for limited memory
#   gradient_accumulation_steps: 8  # Effective batch = 32
#   mixed_precision: "fp16"  # Reduce memory
#   num_workers: 2  # Fewer workers
#
# checkpoints:
#   keep_top_k: 1  # Save disk space
#   keep_last_k: 1
