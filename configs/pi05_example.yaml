# Physical Intelligence Pi0.5 Training Configuration Example
# This file shows all available configuration options with explanations
# Pi0.5 is Physical Intelligence's Vision-Language-Action (VLA) model

# ==============================================================================
# MODEL CONFIGURATION
# ==============================================================================
model:
  # Model type - must be "pi05" for this adapter
  type: pi05

  # Pretrained model path or HuggingFace model ID
  # Options:
  #   - "lerobot/pi05_base" - Base model (recommended for fine-tuning)
  #   - "physical-intelligence/pi05-medium" - Medium model
  #   - "physical-intelligence/pi05-large" - Large model
  #   - "/path/to/local/checkpoint" - Local checkpoint path
  pretrained_model_name_or_path: "lerobot/pi05_base"

  # Whether to freeze the vision/language backbone during training
  # true = freeze (faster, less memory, only train action head)
  # false = fine-tune (slower, more memory, better performance)
  freeze_backbone: false

  # Maximum sequence length for language instructions
  # Typical range: 32-128 tokens
  max_text_length: 77

  # Image size for vision encoder
  # Pi0.5 typically uses [224, 224] or [256, 256]
  image_size: [224, 224]

  # Action dimension - number of action values per timestep
  # Example: 6 DOF robot arm + 1 gripper = 7
  action_dim: 7

  # Action prediction horizon (number of future actions to predict)
  # Pi0.5 can predict action sequences
  # Typical range: 1-16
  action_horizon: 8

  # Action discretization bins (Pi0.5 uses discrete actions)
  # Higher values = more precise but larger vocabulary
  # Typical range: 128-512
  action_bins: 256

  # Dropout rate for regularization
  # Typical range: 0.0-0.2
  dropout: 0.1

# ==============================================================================
# TRAINING PARAMETERS
# ==============================================================================
training:
  # Number of training epochs
  epochs: 20

  # Batch size for training
  # Pi0.5 requires more memory than DiffusionPolicy
  # Adjust based on GPU memory:
  #   - 40GB A100: 32-64
  #   - 24GB RTX 3090: 8-16
  #   - 16GB Apple M-series: 4-8
  batch_size: 16

  # Learning rate for AdamW optimizer
  # Pi0.5 benefits from lower learning rates when fine-tuning
  # Typical range: 1e-5 to 5e-4
  learning_rate: 1e-4

  # Weight decay for L2 regularization
  weight_decay: 1e-4

  # Gradient clipping norm
  # Pi0.5 can have larger gradients due to transformer architecture
  gradient_clip_norm: 1.0

  # Number of dataloader worker processes
  num_workers: 4

  # Mixed precision training
  # Pi0.5 benefits significantly from fp16/bf16
  # Options: "no", "fp16", "bf16"
  mixed_precision: "fp16"

  # Gradient accumulation steps (effective batch size = batch_size * accum_steps)
  # Use this to train with larger effective batch size on limited memory
  gradient_accumulation_steps: 1

  # Learning rate scheduler configuration
  lr_scheduler:
    # Scheduler type: "constant", "linear", "cosine" (recommended for Pi0.5)
    type: cosine

    # Warmup steps - gradually increase LR from 0 to learning_rate
    # Typical: 5-10% of total training steps
    warmup_steps: 1000

    # For "cosine": minimum learning rate
    min_lr: 1e-6

# ==============================================================================
# DATA CONFIGURATION
# ==============================================================================
# Choose ONE of the following data source configurations:

# Option 1: LeRobot Dataset from HuggingFace Hub (RECOMMENDED for Pi0.5)
# ------------------------------------------------------------------------------
data:
  type: lerobot

  # HuggingFace dataset repository ID
  # Pi0.5 works best with LeRobot format datasets
  # Example: "lerobot/koch_test", "lerobot/aloha_sim_insertion_human"
  # Browse: https://huggingface.co/lerobot
  dataset: "lerobot/koch_test"

  # Dataset splits
  train_split: train
  eval_split: test

  # Optional: local directory to cache downloaded dataset
  local_dir: null

  # Language instructions configuration
  # Pi0.5 is a VLA model that conditions on language
  language:
    # How to get language instructions:
    # - "from_dataset": Use task descriptions from dataset metadata
    # - "fixed": Use same instruction for all episodes
    # - "per_episode": Different instruction per episode (from metadata)
    mode: "from_dataset"

    # If mode="fixed", provide the instruction text
    fixed_instruction: "Pick up the red block and place it in the blue bowl"

    # Metadata field containing instruction (if mode="from_dataset" or "per_episode")
    instruction_field: "task_description"

# Option 2: MCAP Dataset (ROS2 bags) with language annotations
# ------------------------------------------------------------------------------
# data:
#   type: mcap
#
#   train_path: "data/train_recordings/*.mcap"
#   eval_path: "data/eval_recordings/*.mcap"
#
#   # ROS2 topic names
#   topics:
#     cameras:
#       - name: wrist_camera
#         topic: /camera/wrist/image_raw
#       - name: overhead_camera
#         topic: /camera/overhead/image_raw
#
#     state_topic: /robot/joint_states
#     action_topic: /robot/action
#
#     # Language instruction topic (Pi0.5 specific)
#     # Each message should contain the task instruction as string
#     instruction_topic: /task/instruction
#
#   # Image preprocessing for Pi0.5
#   image_size: [224, 224]
#   normalize: true
#
#   # Language instructions (if not from MCAP topic)
#   language:
#     mode: "fixed"
#     fixed_instruction: "Pick and place task"

# Option 3: MP4 Video Dataset with language annotations
# ------------------------------------------------------------------------------
# data:
#   type: mp4
#
#   # Directory structure:
#   # train_path/
#   #   episode_001/
#   #     camera_front.mp4
#   #     camera_wrist.mp4
#   #     state.npy
#   #     action.npy
#   #     instruction.txt  (Pi0.5 specific - contains task description)
#   #   episode_002/
#   #     ...
#
#   train_path: "data/train_videos"
#   eval_path: "data/eval_videos"
#
#   camera_names: ["camera_front", "camera_wrist"]
#   state_filename: "state.npy"
#   action_filename: "action.npy"
#
#   # Language instruction filename (Pi0.5 specific)
#   instruction_filename: "instruction.txt"
#
#   fps: 30
#   image_size: [224, 224]
#   normalize: true
#
#   # Alternative: use fixed instruction for all episodes
#   # language:
#   #   mode: "fixed"
#   #   fixed_instruction: "Demonstrate the manipulation task"

# ==============================================================================
# CHECKPOINT CONFIGURATION
# ==============================================================================
checkpoints:
  # Directory to save checkpoints
  dir: ./checkpoints/pi05

  # Save frequency (Pi0.5 checkpoints are large - be mindful of disk space)
  save_every_steps: 2000
  save_every_epochs: null

  # Keep only top K checkpoints to save disk space
  # Pi0.5 checkpoints can be several GB each
  keep_top_k: 2
  keep_last_k: 1

  # Resume from checkpoint
  resume_from: null

  # Save checkpoint format
  # Options: "pytorch" (default), "safetensors" (recommended for large models)
  format: "safetensors"

# ==============================================================================
# EVALUATION CONFIGURATION
# ==============================================================================
evaluation:
  # Evaluation frequency
  eval_every_steps: null
  eval_every_epochs: 2

  # Number of evaluation samples (null = use all)
  # Use fewer samples for faster evaluation
  eval_samples: 100

  # Real-robot evaluation (optional)
  # If provided, will test policy on physical robot during training
  robot_eval:
    enabled: false

    # Number of episodes to run on robot
    num_episodes: 5

    # Robot environment configuration
    # env: "real_robot"
    # robot_config: "configs/robot_setup.yaml"

# ==============================================================================
# LOGGING CONFIGURATION
# ==============================================================================
logging:
  log_every_steps: 10
  log_dir: ./logs

  # Weights & Biases configuration (highly recommended for Pi0.5)
  wandb:
    enabled: true
    project: pi05_robot_learning
    name: pi05_koch_finetuning
    entity: null
    tags: ["pi05", "vla", "robot_manipulation"]
    notes: "Fine-tuning Pi0.5 on koch_test dataset"

    # Log additional metrics
    log_histograms: false  # Log weight histograms (large overhead)
    log_images: true  # Log sample predictions as images
    log_videos: false  # Log video predictions (requires more storage)

# ==============================================================================
# ADVANCED CONFIGURATION (Optional)
# ==============================================================================
advanced:
  # Compile model with torch.compile for faster training (PyTorch 2.0+)
  # Can improve training speed by 20-50% but uses more memory
  torch_compile: false

  # Use DeepSpeed for distributed training (multi-GPU)
  deepspeed:
    enabled: false
    config: "configs/deepspeed_config.json"

  # Use Flash Attention 2 for faster attention computation
  # Requires flash-attn package: pip install flash-attn
  use_flash_attention: false

  # Quantization for reduced memory (experimental)
  # Options: null, "int8", "int4"
  quantization: null

# ==============================================================================
# EXAMPLE CONFIGURATIONS FOR SPECIFIC SCENARIOS
# ==============================================================================

# Scenario 1: Quick fine-tuning on small dataset (frozen backbone)
# ------------------------------------------------------------------------------
# model:
