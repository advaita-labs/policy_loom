# Minimal DiffusionPolicy Configuration
# Ready to use with: python scripts/train_diffusion_eval_t10.py --config configs/diffusion_minimal.yaml

model:
  type: diffusion_policy
  obs_dim: 6
  action_dim: 6
  obs_horizon: 2
  action_horizon: 8
  hidden_dim: 256
  num_diffusion_steps: 100
  camera_names: []

training:
  epochs: 10
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 1e-6
  gradient_clip_norm: 1.0
  num_workers: 4
  lr_scheduler:
    type: cosine
    min_lr: 1e-6

data:
  type: lerobot
  dataset: "LBST/eval_t10_pick_and_place"
  train_split: train
  eval_split: null
  local_dir: null

checkpoints:
  dir: ./checkpoints/diffusion_policy
  save_every_steps: 1000
  save_every_epochs: null
  keep_top_k: 2
  keep_last_k: 1
  resume_from: null

evaluation:
  eval_every_steps: null
  eval_every_epochs: 5

logging:
  log_every_steps: 10
  log_dir: ./logs
  wandb:
    enabled: false
    project: robot_learning
    name: null
    entity: null
    tags: []
    notes: ""
