# Minimal Pi0.5 Configuration
# Ready to use with: python scripts/train_pi05.py --config configs/pi05_minimal.yaml

model:
  type: pi05
  pretrained_model_name_or_path: "lerobot/pi05_base"
  freeze_backbone: false
  max_text_length: 77
  image_size: [224, 224]
  action_dim: 7
  action_horizon: 8
  action_bins: 256
  dropout: 0.1

training:
  epochs: 20
  batch_size: 16
  learning_rate: 1e-4
  weight_decay: 1e-4
  gradient_clip_norm: 1.0
  num_workers: 4
  mixed_precision: "fp16"
  gradient_accumulation_steps: 1
  lr_scheduler:
    type: cosine
    warmup_steps: 1000
    min_lr: 1e-6

data:
  type: lerobot
  dataset: "lerobot/koch_test"
  train_split: train
  eval_split: test
  local_dir: null
  language:
    mode: "from_dataset"
    instruction_field: "task_description"

checkpoints:
  dir: ./checkpoints/pi05
  save_every_steps: 2000
  save_every_epochs: null
  keep_top_k: 2
  keep_last_k: 1
  resume_from: null
  format: "safetensors"

evaluation:
  eval_every_steps: null
  eval_every_epochs: 2
  eval_samples: 100

logging:
  log_every_steps: 10
  log_dir: ./logs
  wandb:
    enabled: true
    project: pi05_robot_learning
    name: null
    entity: null
    tags: ["pi05", "vla"]
    notes: ""
    log_histograms: false
    log_images: true
    log_videos: false
