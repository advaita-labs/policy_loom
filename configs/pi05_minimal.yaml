# Minimal Pi0.5 Configuration
# Train from scratch using Physical Intelligence's openpi implementation
#
# Usage:
#   1. Install with pi05 support:
#      GIT_LFS_SKIP_SMUDGE=1 uv sync --extra pi05
#
#   2. Train:
#      loom train configs/pi05_minimal.yaml

model:
  type: pi05

  # OpenPI config (pi05_libero, pi05_droid, pi05_aloha, etc.)
  config_name: pi05_libero

  # Model architecture (may be overridden by openpi config)
  action_dim: 7
  action_horizon: 10
  image_size: [224, 224]

  # Training mode: from scratch
  pretrained_path: null  # Set to checkpoint path or GCS URL to load pretrained

  # Fine-tuning options
  use_lora: false
  lora_rank: 8
  freeze_backbone: false

  # Optional prompt
  default_prompt: null  # e.g., "Pick up the object"

training:
  epochs: 50
  batch_size: 8  # Reduce if GPU memory limited
  learning_rate: 1e-4
  weight_decay: 1e-5
  gradient_clip_norm: 1.0
  num_workers: 4

  lr_scheduler:
    type: cosine
    warmup_steps: 500
    min_lr: 1e-6

data:
  type: lerobot
  dataset: "lerobot/pusht"  # LeRobot format dataset
  train_split: train
  eval_split: null  # Set to "test" for evaluation
  local_dir: null  # Cache directory (optional)

checkpoints:
  dir: ./checkpoints/pi05
  save_every_steps: null
  save_every_epochs: 5
  keep_top_k: 2
  keep_last_k: 1
  resume_from: null

evaluation:
  eval_every_steps: null
  eval_every_epochs: 10

logging:
  log_every_steps: 10
  log_dir: ./logs/pi05
  wandb:
    enabled: false
    project: robot_learning
    name: pi05_training
    entity: null
    tags: ["pi05", "openpi"]
    notes: "Training Pi0.5 with openpi"
